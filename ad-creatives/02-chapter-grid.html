<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #111111;
    display: flex;
    flex-direction: column;
    padding: 72px 80px;
    position: relative;
  }
  
  .header {
    font-size: 44px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -1.5px;
  }
  
  .subheader {
    font-size: 24px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    margin-bottom: 48px;
    letter-spacing: -0.3px;
  }
  
  .chapter {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  
  .chapter:first-of-type {
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  
  .chapter-num {
    font-size: 18px;
    font-weight: 800;
    color: #E86A1C;
    min-width: 36px;
    letter-spacing: 1px;
  }
  
  .chapter-title {
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  
  .bonus {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 22px 0;
  }
  
  .bonus-tag {
    font-size: 14px;
    font-weight: 800;
    color: #E86A1C;
    background: rgba(232, 106, 28, 0.12);
    padding: 6px 14px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  
  .bonus-title {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: -0.3px;
  }
  
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #E86A1C;
    padding: 36px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .cta-text {
    font-size: 28px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  
  .cta-price {
    font-size: 28px;
    font-weight: 800;
    color: #FFFFFF;
  }
</style>
</head>
<body>
  <div class="header">Everything your lecturers skip.</div>
  <div class="subheader">5 chapters + weekly planner</div>
  
  <div class="chapter">
    <div class="chapter-num">01</div>
    <div class="chapter-title">So... Architecture</div>
  </div>
  
  <div class="chapter">
    <div class="chapter-num">02</div>
    <div class="chapter-title">The Top Student Mindset</div>
  </div>
  
  <div class="chapter">
    <div class="chapter-num">03</div>
    <div class="chapter-title">Crits, Deadlines & Timing</div>
  </div>
  
  <div class="chapter">
    <div class="chapter-num">04</div>
    <div class="chapter-title">From Brief to Concept</div>
  </div>
  
  <div class="chapter">
    <div class="chapter-num">05</div>
    <div class="chapter-title">Site Analysis & Urban Design</div>
  </div>
  
  <div class="bonus">
    <div class="bonus-tag">BONUS</div>
    <div class="bonus-title">Konteks Kalendar (weekly planner)</div>
  </div>
  
  <div class="cta-bar">
    <div class="cta-text">$29/mo - Cancel anytime</div>
    <div class="cta-price">kourse.konteks.co</div>
  </div>
</body>
</html>
