<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #111111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    position: relative;
  }
  
  .eyebrow {
    font-size: 18px;
    font-weight: 700;
    color: #E86A1C;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 32px;
  }
  
  .number {
    font-size: 200px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: -8px;
    margin-bottom: 24px;
  }
  
  .description {
    font-size: 36px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
    max-width: 700px;
    letter-spacing: -0.5px;
  }
  
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #E86A1C;
    padding: 36px 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
  }
  
  .cta-text {
    font-size: 30px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  
  .cta-divider {
    width: 2px;
    height: 28px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <div class="eyebrow">Konteks Kourse</div>
  <div class="number">363+</div>
  <div class="description">architecture students learning<br>systems that actually work in studio</div>
  
  <div class="cta-bar">
    <div class="cta-text">Join them</div>
    <div class="cta-divider"></div>
    <div class="cta-text">$29/month</div>
  </div>
</body>
</html>
