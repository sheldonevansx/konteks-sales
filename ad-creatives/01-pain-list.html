<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
    position: relative;
  }
  
  .hook {
    font-size: 52px;
    font-weight: 900;
    color: #111111;
    line-height: 1.15;
    margin-bottom: 56px;
    letter-spacing: -1.5px;
  }
  
  .pain-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 32px;
  }
  
  .pain-icon {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border: 3px solid #E86A1C;
    border-radius: 6px;
    margin-top: 6px;
  }
  
  .pain-text {
    font-size: 32px;
    font-weight: 600;
    color: #333333;
    line-height: 1.35;
    letter-spacing: -0.5px;
  }
  
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #E86A1C;
    padding: 36px 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .cta-text {
    font-size: 30px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  
  .cta-url {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
  <div class="hook">Sound familiar?</div>
  
  <div class="pain-item">
    <div class="pain-icon"></div>
    <div class="pain-text">You redesign your project 3 times before every crit</div>
  </div>
  
  <div class="pain-item">
    <div class="pain-icon"></div>
    <div class="pain-text">You have no system for managing your time</div>
  </div>
  
  <div class="pain-item">
    <div class="pain-icon"></div>
    <div class="pain-text">Your concepts feel random every single time</div>
  </div>
  
  <div class="pain-item">
    <div class="pain-icon"></div>
    <div class="pain-text">You pull all-nighters at least once a week</div>
  </div>
  
  <div class="cta-bar">
    <div class="cta-text">There's a better way.</div>
    <div class="cta-url">kourse.konteks.co</div>
  </div>
</body>
</html>
