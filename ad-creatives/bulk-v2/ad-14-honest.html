<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The Honest Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif;">
    <div style="width: 1080px; height: 1080px; background: #000000; display: flex; flex-direction: column; padding: 120px 100px; position: relative; overflow: hidden;">
        <div style="font-size: 14px; color: #E86A1C; text-transform: uppercase; margin-bottom: 60px;">
            honest ad:
        </div>
        <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px;">
            <div style="font-size: 28px; color: #ffffff; line-height: 1.4;">
                i can't make you talented.
            </div>
            <div style="font-size: 28px; color: #ffffff; line-height: 1.4;">
                i can't give you taste.
            </div>
            <div style="font-size: 28px; color: #ffffff; line-height: 1.4;">
                i can't sit your exams for you.
            </div>
        </div>
        <div style="margin-bottom: 15px;">
            <div style="font-size: 20px; color: #888888; line-height: 1.5; margin-bottom: 10px;">
                but i can teach you
            </div>
            <div style="font-size: 24px; color: #ffffff; line-height: 1.4;">
                the frameworks that nobody else will.
            </div>
        </div>
        <div style="position: absolute; bottom: 100px; font-size: 12px; color: #555555;">
            5 chapters. $29/mo. cancel anytime.
        </div>
    </div>
</body>
</html>
