<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The Knowledge Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif;">
    <div style="width: 1080px; height: 1080px; background: #000000; display: flex; flex-direction: column; padding: 100px 80px; position: relative; overflow: hidden;">
        <div style="margin-bottom: 50px;">
            <div style="font-size: 28px; color: #888888; line-height: 1.4;">
                here's what nobody
            </div>
            <div style="font-size: 28px; color: #888888; line-height: 1.4;">
                in studio tells you:
            </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 30px; margin-bottom: auto;">
            <div style="display: flex; align-items: baseline; gap: 20px;">
                <div style="font-size: 32px; font-weight: 900; color: #E86A1C; min-width: 50px;">01</div>
                <div style="font-size: 18px; color: #ffffff; line-height: 1.5;">your concept is too generic</div>
            </div>
            <div style="display: flex; align-items: baseline; gap: 20px;">
                <div style="font-size: 32px; font-weight: 900; color: #E86A1C; min-width: 50px;">02</div>
                <div style="font-size: 18px; color: #ffffff; line-height: 1.5;">your time management is backwards</div>
            </div>
            <div style="display: flex; align-items: baseline; gap: 20px;">
                <div style="font-size: 32px; font-weight: 900; color: #E86A1C; min-width: 50px;">03</div>
                <div style="font-size: 18px; color: #ffffff; line-height: 1.5;">your crit presentation matters more than your design</div>
            </div>
            <div style="display: flex; align-items: baseline; gap: 20px;">
                <div style="font-size: 32px; font-weight: 900; color: #E86A1C; min-width: 50px;">04</div>
                <div style="font-size: 18px; color: #ffffff; line-height: 1.5;">site analysis is 80% of a good project</div>
            </div>
        </div>
        <div style="font-size: 12px; color: #555555; margin-top: 60px;">
            — dan fouché, architect
        </div>
    </div>
</body>
</html>
