<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The Compare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif;">
    <div style="width: 1080px; height: 1080px; background: #000000; display: flex; position: relative; overflow: hidden;">
        <div style="flex: 1; padding: 100px 60px; border-right: 1px solid #333333;">
            <div style="font-size: 16px; color: #888888; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 60px;">
                MOST STUDENTS
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div style="font-size: 14px; color: #666666; line-height: 1.6;">start with Pinterest</div>
                <div style="font-size: 14px; color: #666666; line-height: 1.6;">render 15 views</div>
                <div style="font-size: 14px; color: #666666; line-height: 1.6;">pull all-nighters</div>
                <div style="font-size: 14px; color: #666666; line-height: 1.6;">get vague feedback</div>
                <div style="font-size: 14px; color: #666666; line-height: 1.6;">wing every crit</div>
            </div>
        </div>
        <div style="flex: 1; padding: 100px 60px;">
            <div style="font-size: 16px; color: #E86A1C; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 60px;">
                363 STUDENTS
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div style="font-size: 14px; color: #ffffff; line-height: 1.6;">start with context</div>
                <div style="font-size: 14px; color: #ffffff; line-height: 1.6;">use 3-render rule</div>
                <div style="font-size: 14px; color: #ffffff; line-height: 1.6;">finish by 8pm</div>
                <div style="font-size: 14px; color: #ffffff; line-height: 1.6;">know what lecturers want</div>
                <div style="font-size: 14px; color: #ffffff; line-height: 1.6;">present with a system</div>
            </div>
        </div>
    </div>
</body>
</html>
