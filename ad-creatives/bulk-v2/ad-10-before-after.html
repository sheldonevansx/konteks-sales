<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The Before/After</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif;">
    <div style="width: 1080px; height: 1080px; display: flex; flex-direction: column; position: relative; overflow: hidden;">
        <div style="flex: 1; display: flex;">
            <div style="flex: 1; background: #8B1E1E; padding: 80px 60px; display: flex; flex-direction: column;">
                <div style="font-size: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 50px;">
                    BEFORE
                </div>
                <div style="display: flex; flex-direction: column; gap: 25px;">
                    <div style="font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.5;">sunday 3am</div>
                    <div style="font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.5;">no concept</div>
                    <div style="font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.5;">crit in 2 days</div>
                    <div style="font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.5;">crying over your model</div>
                    <div style="font-size: 16px; color: rgba(255, 255, 255, 0.7); line-height: 1.5;">6 red bulls deep</div>
                </div>
            </div>
            <div style="flex: 1; background: #1A3D2E; padding: 80px 60px; display: flex; flex-direction: column;">
                <div style="font-size: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 50px;">
                    AFTER
                </div>
                <div style="display: flex; flex-direction: column; gap: 25px;">
                    <div style="font-size: 16px; color: #ffffff; line-height: 1.5;">sunday 8pm</div>
                    <div style="font-size: 16px; color: #ffffff; line-height: 1.5;">concept locked</div>
                    <div style="font-size: 16px; color: #ffffff; line-height: 1.5;">boards prepped</div>
                    <div style="font-size: 16px; color: #ffffff; line-height: 1.5;">actually sleeping</div>
                    <div style="font-size: 16px; color: #ffffff; line-height: 1.5;">alarm set for 7</div>
                </div>
            </div>
        </div>
        <div style="background: #000000; padding: 30px; text-align: center;">
            <div style="font-size: 14px; color: #ffffff;">
                363 architecture students made the switch.
            </div>
        </div>
    </div>
</body>
</html>
