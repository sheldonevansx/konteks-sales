<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The Roast</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif;">
    <div style="width: 1080px; height: 1080px; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; text-align: center; padding: 0 120px;">
        <div style="position: absolute; top: 100px; font-size: 16px; color: #666666; text-transform: lowercase;">
            your site analysis:
        </div>
        <div style="margin-bottom: 40px;">
            <div style="font-size: 48px; line-height: 1.5; margin-bottom: 10px;">
                ☀️ → →
            </div>
            <div style="font-size: 48px; line-height: 1.5;">
                💨
            </div>
        </div>
        <div style="font-size: 20px; color: #888888; margin-bottom: 60px; line-height: 1.5;">
            a sun path and some wind arrows
        </div>
        <div style="margin-top: 40px;">
            <div style="font-size: 24px; color: #ffffff; margin-bottom: 20px; line-height: 1.4;">
                you know it's not enough.
            </div>
            <div style="font-size: 18px; color: #E86A1C; line-height: 1.5;">
                i'll show you what enough looks like.
            </div>
        </div>
    </div>
</body>
</html>
