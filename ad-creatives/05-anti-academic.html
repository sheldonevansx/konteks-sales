<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #111111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
    position: relative;
  }
  
  .strikethrough-line {
    font-size: 42px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
    text-decoration-color: #E86A1C;
    text-decoration-thickness: 3px;
    margin-bottom: 40px;
    letter-spacing: -1px;
    line-height: 1.3;
  }
  
  .main-text {
    font-size: 52px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: -2px;
    margin-bottom: 40px;
  }
  
  .accent {
    color: #E86A1C;
  }
  
  .bullets {
    list-style: none;
    margin-bottom: 20px;
  }
  
  .bullets li {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    padding: 12px 0;
    padding-left: 32px;
    position: relative;
    letter-spacing: -0.3px;
  }
  
  .bullets li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    background: #E86A1C;
    border-radius: 3px;
  }
  
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #E86A1C;
    padding: 36px 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .cta-text {
    font-size: 28px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  
  .cta-url {
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
  <div class="strikethrough-line">Architecture school teaches theory.</div>
  <div class="main-text">We teach you how to<br>actually <span class="accent">design.</span></div>
  
  <ul class="bullets">
    <li>Decode any brief in 30 minutes</li>
    <li>A time system that kills all-nighters</li>
    <li>Present at crits with confidence</li>
  </ul>
  
  <div class="cta-bar">
    <div class="cta-text">326+ students inside</div>
    <div class="cta-url">kourse.konteks.co</div>
  </div>
</body>
</html>
