<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Pain List Ad Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #F5F1ED;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .top-section {
    position: absolute;
    top: 50px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid #E86A1C;
    background: #E86A1C;
    flex-shrink: 0;
  }

  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: #999;
  }

  .middle-section {
    position: absolute;
    top: 216px;
    left: 60px;
  }

  .headline {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 42px;
    color: #1A1A1A;
    line-height: 1.15;
  }

  .pain-list {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .pain-item {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    color: #333;
    line-height: 1.3;
  }

  .cta-text {
    margin-top: 40px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 26px;
    color: #1A1A1A;
  }

  .bottom-section {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
  }

  .button {
    width: 500px;
    height: 56px;
    background: #E86A1C;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #fff;
  }
</style>
</head>
<body>
  <div class="top-section">
    <div class="avatar"></div>
    <span class="handle">@studwalldan</span>
  </div>

  <div class="middle-section">
    <div class="headline">Architecture school<br>doesn't teach you:</div>
    <div class="pain-list">
      <div class="pain-item">❌ How to actually manage your time</div>
      <div class="pain-item">❌ How to present without panicking</div>
      <div class="pain-item">❌ How to go from brief to concept in 48hrs</div>
      <div class="pain-item">❌ How to survive your first crit</div>
    </div>
    <div class="cta-text">That's why I built this.</div>
  </div>

  <div class="bottom-section">
    <div class="button">Join 363 students who figured it out</div>
  </div>
</body>
</html>
