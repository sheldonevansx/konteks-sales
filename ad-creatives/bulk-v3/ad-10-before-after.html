<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#000;">
<div style="width:1080px;height:1080px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;box-sizing:border-box;">
  
  <!-- Two-tone split -->
  <div style="flex:1;display:flex;">
    <!-- Left: BEFORE -->
    <div style="flex:1;background:#1A1111;padding:80px 60px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:6px;margin-bottom:60px;">BEFORE</div>
      <div style="font-size:20px;color:rgba(255,255,255,0.5);line-height:2.5;">
        <div>sunday 3am</div>
        <div>no concept</div>
        <div>crying over your model</div>
        <div>6 red bulls deep</div>
        <div>crit in 2 days</div>
      </div>
    </div>
    
    <!-- Right: AFTER -->
    <div style="flex:1;background:#111A14;padding:80px 60px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:6px;margin-bottom:60px;">AFTER</div>
      <div style="font-size:20px;color:#fff;line-height:2.5;">
        <div>sunday 8pm</div>
        <div>concept locked</div>
        <div>boards prepped</div>
        <div>actually sleeping</div>
        <div>alarm set for 7</div>
      </div>
    </div>
  </div>
  
  <!-- Bottom: full-width brand bar -->
  <div style="background:#000;padding:24px 80px;display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:15px;color:#fff;line-height:1.4;">363 architecture students made the switch.</div>
    <div style="background:#E86A1C;color:#fff;font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">MAKE THE SWITCH →</div>
  </div>
  
</div>
</body>
</html>
