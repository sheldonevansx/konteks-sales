<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
</style>
</head>
<body>
<div style="width:1080px;height:1080px;background:#000;font-family:'Inter',sans-serif;display:flex;flex-direction:column;overflow:hidden;">
  
  <!-- Header -->
  <div style="padding:60px 60px 0 60px;">
    <div style="font-size:13px;color:#555;text-transform:uppercase;letter-spacing:5px;text-align:center;margin-bottom:40px;">spot the difference</div>
  </div>
  
  <!-- Two columns -->
  <div style="flex:1;display:flex;padding:0 60px;">
    
    <!-- Left column -->
    <div style="flex:1;display:flex;flex-direction:column;padding-right:30px;border-right:1px solid #E86A1C;">
      <div style="font-size:12px;color:#555;text-transform:uppercase;letter-spacing:4px;margin-bottom:40px;">MOST STUDENTS</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:space-around;">
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">×</span>
          <span style="font-size:22px;color:#666;">start with Pinterest</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">×</span>
          <span style="font-size:22px;color:#666;">render 15 views</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">×</span>
          <span style="font-size:22px;color:#666;">pull all-nighters</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">×</span>
          <span style="font-size:22px;color:#666;">get vague feedback</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">×</span>
          <span style="font-size:22px;color:#666;">wing every crit</span>
        </div>
      </div>
    </div>
    
    <!-- Right column -->
    <div style="flex:1;display:flex;flex-direction:column;padding-left:30px;">
      <div style="font-size:12px;color:#E86A1C;text-transform:uppercase;letter-spacing:4px;margin-bottom:40px;">KONTEKS STUDENTS</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:space-around;">
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">✓</span>
          <span style="font-size:22px;color:#fff;font-weight:500;">start with context</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">✓</span>
          <span style="font-size:22px;color:#fff;font-weight:500;">use 3-render rule</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">✓</span>
          <span style="font-size:22px;color:#fff;font-weight:500;">finish by 8pm</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">✓</span>
          <span style="font-size:22px;color:#fff;font-weight:500;">know what lecturers want</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:28px;color:#E86A1C;">✓</span>
          <span style="font-size:22px;color:#fff;font-weight:500;">present with a system</span>
        </div>
      </div>
    </div>
    
  </div>
  
  <!-- Bottom brand bar -->
  <div style="padding:0 60px 40px 60px;">
    <div style="border-top:1px solid #222;padding-top:20px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;">KONTEKS KOURSE</span>
        <span style="font-size:13px;color:#555;margin-left:12px;">$29/mo</span>
      </div>
      <div style="background:#E86A1C;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:8px;">MAKE THE SWITCH →</div>
    </div>
  </div>
  
</div>
</body>
</html>
