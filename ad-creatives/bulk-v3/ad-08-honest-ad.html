<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
</style>
</head>
<body>
<div style="width:1080px;height:1080px;background:#000;font-family:'Inter',sans-serif;display:flex;flex-direction:column;overflow:hidden;">
  
  <!-- Top label -->
  <div style="padding:60px 80px 0 80px;">
    <div style="font-size:13px;color:#E86A1C;text-transform:uppercase;letter-spacing:6px;text-align:center;">HONEST AD</div>
  </div>
  
  <!-- Main content -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;text-align:center;">
    
    <!-- The "can't" stack -->
    <div style="margin-bottom:60px;">
      <div style="font-size:42px;color:#fff;line-height:1.8;font-weight:400;">i can't make you talented.</div>
      <div style="font-size:42px;color:#fff;line-height:1.8;font-weight:400;">i can't give you taste.</div>
      <div style="font-size:42px;color:#fff;line-height:1.8;font-weight:400;">i can't sit your exams.</div>
    </div>
    
    <!-- The "but" -->
    <div style="width:60px;height:2px;background:#E86A1C;margin-bottom:40px;"></div>
    
    <div style="margin-bottom:0;">
      <div style="font-size:28px;color:#888;line-height:1.5;margin-bottom:8px;">but i can teach you</div>
      <div style="font-size:36px;color:#fff;font-weight:700;line-height:1.4;">the frameworks that get you</div>
      <div style="font-size:36px;color:#E86A1C;font-weight:700;line-height:1.4;">through studio alive.</div>
    </div>
    
  </div>
  
  <!-- Bottom brand bar -->
  <div style="padding:0 60px 40px 60px;">
    <div style="border-top:1px solid #222;padding-top:20px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;">KONTEKS KOURSE</span>
        <span style="font-size:13px;color:#555;margin-left:12px;">5 chapters · $29/mo</span>
      </div>
      <div style="background:#E86A1C;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:8px;">LEARN THE SYSTEM →</div>
    </div>
  </div>
  
</div>
</body>
</html>
