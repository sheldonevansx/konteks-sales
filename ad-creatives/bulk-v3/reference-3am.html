<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#000;">
<div style="width:1080px;height:1080px;background:#000;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:72px 80px 48px 80px;box-sizing:border-box;">
  
  <!-- Top: audience qualifier -->
  <div style="font-size:13px;color:#555;text-transform:uppercase;letter-spacing:5px;margin-bottom:40px;">for architecture students</div>
  
  <!-- Main: the hook - takes up most of the space -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <div style="font-size:200px;font-weight:900;color:#E86A1C;line-height:0.85;letter-spacing:-8px;margin-bottom:24px;">3AM</div>
    <div style="font-size:64px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:8px;">No concept.</div>
    <div style="font-size:64px;font-weight:800;color:#fff;line-height:1.1;">Crit in 12 hours.</div>
  </div>
  
  <!-- Bridge text -->
  <div style="margin-bottom:32px;">
    <div style="width:60px;height:3px;background:#E86A1C;margin-bottom:20px;"></div>
    <div style="font-size:20px;color:#999;line-height:1.5;">This doesn't have to be your routine.</div>
    <div style="font-size:20px;color:#fff;line-height:1.5;font-weight:600;">363 students learned a system that gets them home by 8pm.</div>
  </div>
  
  <!-- Bottom: brand bar with CTA -->
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #222;padding-top:20px;">
    <div>
      <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;">KONTEKS KOURSE</span>
      <span style="font-size:13px;color:#555;margin-left:16px;">by @studwalldan</span>
    </div>
    <div style="background:#E86A1C;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:8px;letter-spacing:0.5px;">LEARN THE SYSTEM →</div>
  </div>
  
</div>
</body>
</html>
