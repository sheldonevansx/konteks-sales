<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,500&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#F5F1ED;">
<div style="width:1080px;height:1080px;background:#F5F1ED;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:80px;box-sizing:border-box;">
  
  <!-- Decorative quote mark -->
  <div style="position:absolute;top:60px;left:80px;font-size:200px;color:#E86A1C;opacity:0.3;line-height:1;">"</div>
  
  <!-- Main content: centered -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;z-index:1;">
    <div style="font-size:64px;font-weight:500;font-style:italic;color:#1A1A1A;line-height:1.2;margin-bottom:40px;">Push it further.</div>
    
    <div style="font-size:22px;color:#999;line-height:1.4;margin-bottom:10px;">you've heard it 50 times.</div>
    <div style="font-size:22px;font-weight:600;color:#1A1A1A;line-height:1.4;margin-bottom:40px;">has anyone told you what it means?</div>
    
    <div style="font-size:20px;font-weight:600;color:#E86A1C;line-height:1.4;margin-bottom:10px;">i did. in 5 chapters.</div>
    <div style="font-size:14px;color:#999;line-height:1.4;">— dan fouché, architect</div>
  </div>
  
  <!-- Bottom: brand bar with CTA (dark version) -->
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #DDD;padding-top:24px;">
    <div>
      <span style="font-size:16px;font-weight:700;color:#1A1A1A;letter-spacing:1.5px;">KONTEKS KOURSE</span>
      <span style="font-size:13px;color:#999;margin-left:16px;">by @studwalldan</span>
    </div>
    <div style="background:#E86A1C;color:#fff;font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">READ THE CHAPTERS →</div>
  </div>
  
</div>
</body>
</html>
