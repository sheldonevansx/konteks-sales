<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#000;">
<div style="width:1080px;height:1080px;background:#000;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:80px;box-sizing:border-box;">
  
  <!-- Main content: centered -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div style="font-size:48px;font-weight:400;color:#666;line-height:1.2;margin-bottom:12px;">Studio was built</div>
    <div style="font-size:56px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:30px;">to filter you out.</div>
    
    <div style="font-size:48px;font-weight:400;color:#666;line-height:1.2;margin-bottom:12px;">Not to teach you</div>
    <div style="font-size:56px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:50px;">how to survive.</div>
    
    <div style="width:80px;height:2px;background:#E86A1C;margin-bottom:30px;"></div>
    <div style="font-size:18px;color:#888;line-height:1.4;">363 students learned the system.</div>
  </div>
  
  <!-- Bottom: brand bar with CTA -->
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #222;padding-top:24px;">
    <div>
      <span style="font-size:16px;font-weight:700;color:#fff;letter-spacing:1.5px;">KONTEKS KOURSE</span>
      <span style="font-size:13px;color:#555;margin-left:16px;">by @studwalldan</span>
    </div>
    <div style="background:#E86A1C;color:#fff;font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">LEARN THE SYSTEM →</div>
  </div>
  
</div>
