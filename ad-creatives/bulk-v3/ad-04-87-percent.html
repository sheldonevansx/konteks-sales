<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
</style>
</head>
<body>
<div style="width:1080px;height:1080px;background:#000;font-family:'Inter',sans-serif;display:flex;flex-direction:column;overflow:hidden;">
  
  <!-- Top spacer -->
  <div style="height:80px;"></div>
  
  <!-- Main content area -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;text-align:center;">
    
    <!-- The big stat -->
    <div style="font-size:280px;font-weight:900;color:#fff;line-height:0.85;letter-spacing:-14px;margin-bottom:40px;">87%</div>
    
    <!-- Supporting text -->
    <div style="font-size:26px;color:#999;line-height:1.6;margin-bottom:8px;">of architecture students have</div>
    <div style="font-size:26px;color:#999;line-height:1.6;margin-bottom:8px;">never been taught how to</div>
    <div style="font-size:34px;color:#E86A1C;font-weight:700;line-height:1.4;margin-bottom:50px;">develop a concept.</div>
    
    <!-- Punchline -->
    <div style="width:60px;height:2px;background:#333;margin-bottom:24px;"></div>
    <div style="font-size:20px;color:#666;line-height:1.5;">the other 13% had a framework.</div>
    <div style="font-size:20px;color:#fff;font-weight:600;line-height:1.5;">now 363 students do too.</div>
    
  </div>
  
  <!-- Bottom brand bar -->
  <div style="padding:0 60px 40px 60px;">
    <div style="border-top:1px solid #222;padding-top:20px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;">KONTEKS KOURSE</span>
        <span style="font-size:13px;color:#555;margin-left:16px;">by @studwalldan</span>
      </div>
      <div style="background:#E86A1C;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:8px;">GET THE FRAMEWORK →</div>
    </div>
  </div>
  
</div>
</body>
</html>
