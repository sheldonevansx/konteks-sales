<!DOCTYPE html>

<body style="margin:0;padding:0;background:#000;">
<div style="width:1080px;height:1080px;background:#000;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:80px;box-sizing:border-box;">

  <div style="flex:1;display:flex;flex-direction:column;justify-content:space-evenly;">

      <div style="font-size:80px;font-weight:900;color:#E86A1C;line-height:1;">01</div>

      <div style="font-size:80px;font-weight:900;color:#E86A1C;line-height:1;">04</div>

    </div>
  </div>
  
  <!-- Bottom: brand bar with CTA -->
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #222;padding-top:24px;margin-top:50px;">
    <div>
      <span style="font-size:16px;font-weight:700;color:#fff;letter-spacing:1.5px;">KONTEKS KOURSE</span>

    <div style="background:#E86A1C;color:#fff;font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">LEARN THE TRUTH →</div>
