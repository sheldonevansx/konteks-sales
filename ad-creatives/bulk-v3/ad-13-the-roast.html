<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#000;">
<div style="width:1080px;height:1080px;background:#000;position:relative;overflow:hidden;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:80px;box-sizing:border-box;">
  
  <!-- Top label -->
  <div style="text-align:center;font-size:16px;color:#555;text-transform:uppercase;letter-spacing:3px;margin-bottom:80px;">your site analysis:</div>
  
  <!-- Main content: centered emoji diagram -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div style="font-size:64px;line-height:1.5;margin-bottom:20px;">
      <div style="margin-bottom:20px;">☀️  →  →  →</div>
      <div style="display:flex;justify-content:center;gap:100px;">
        <span>💨</span>
        <span style="font-size:40px;">🧭</span>
      </div>
    </div>
    
    <div style="font-size:24px;color:#888;line-height:1.4;margin:60px 0 50px 0;">a sun path and some wind arrows.</div>
    
    <div style="font-size:28px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:12px;">you know that's not enough.</div>
    <div style="font-size:22px;color:#E86A1C;line-height:1.4;">let me show you what is.</div>
  </div>
  
  <!-- Bottom: brand bar with CTA -->
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #222;padding-top:24px;">
    <div>
      <span style="font-size:16px;font-weight:700;color:#fff;letter-spacing:1.5px;">KONTEKS KOURSE</span>
      <span style="font-size:13px;color:#555;margin-left:16px;">by @studwalldan</span>
    </div>
    <div style="background:#E86A1C;color:#fff;font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">SHOW ME →</div>
  </div>
  
</div>
</body>
</html>
